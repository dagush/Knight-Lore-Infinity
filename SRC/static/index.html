<!doctype html>
<html>
    <head>
        <title>JSSpeccy v3</title>
        <script src="jsspeccy/jsspeccy.js?v=stage3-square-cross-20260629-1"></script>
        <style>
            :root {
                color-scheme: dark;
                font-family: Arial, Helvetica, sans-serif;
            }

            body {
                margin: 0;
                min-height: 100vh;
                background: #30343a;
                color: #f2f5f8;
            }

            .page-shell {
                width: min(1080px, calc(100vw - 32px));
                margin: 0 auto;
                padding: 18px 0 28px;
            }

            #jsspeccy {
                width: 640px;
                max-width: 100%;
                margin: 0 auto;
                background-color: white;
            }

            .diagnostics {
                margin-top: 16px;
                border: 1px solid #5b6570;
                background: #1f2329;
            }

            .diagnostics h1 {
                margin: 0;
                padding: 10px 12px;
                border-bottom: 1px solid #5b6570;
                color: #ffffff;
                font-size: 16px;
                font-weight: 700;
                letter-spacing: 0;
            }

            .stage-status {
                margin: 0;
                padding: 9px 12px;
                border-bottom: 1px solid #3d454f;
                color: #c7d1dc;
                font-size: 13px;
                line-height: 1.35;
            }

            .diagnostics-table {
                width: 100%;
                border-collapse: collapse;
                table-layout: fixed;
                font-size: 13px;
                line-height: 1.35;
            }

            .diagnostics-table th,
            .diagnostics-table td {
                padding: 7px 9px;
                border-bottom: 1px solid #3d454f;
                vertical-align: top;
                overflow-wrap: anywhere;
            }

            .diagnostics-table th {
                background: #2b3138;
                color: #d9e4ee;
                text-align: left;
                font-weight: 700;
            }

            .diagnostics-table tr:last-child td {
                border-bottom: 0;
            }

            .diagnostics-table .field {
                width: 28%;
                color: #d6dde5;
                font-weight: 700;
            }

            .diagnostics-table .value {
                width: 32%;
                font-family: Menlo, Consolas, monospace;
                color: #ffffff;
            }

            .diagnostics-table .notes {
                width: 40%;
                color: #c7d1dc;
            }

            .diagnostics-table tr.state-ok .notes {
                color: #9be6b0;
            }

            .diagnostics-table tr.state-warn .notes {
                color: #ffd98d;
            }

            .diagnostics-table tr.state-bad .notes {
                color: #ffaaa0;
            }

            .diagnostics-table tr.state-muted .notes {
                color: #98a4b1;
            }

            .cross-table {
                table-layout: fixed;
                font-size: 12px;
            }

            .cross-table th:nth-child(1),
            .cross-table td:nth-child(1) {
                width: 8%;
            }

            .cross-table th:nth-child(2),
            .cross-table td:nth-child(2) {
                width: 7%;
            }

            .cross-table th:nth-child(3),
            .cross-table td:nth-child(3) {
                width: 15%;
            }

            .cross-table th:nth-child(4),
            .cross-table td:nth-child(4) {
                width: 12%;
            }

            .cross-table th:nth-child(5),
            .cross-table td:nth-child(5) {
                width: 10%;
            }

            .cross-table th:nth-child(6),
            .cross-table td:nth-child(6) {
                width: 25%;
            }

            .cross-table th:nth-child(7),
            .cross-table td:nth-child(7) {
                width: 12%;
            }

            .cross-table th:nth-child(8),
            .cross-table td:nth-child(8) {
                width: 11%;
            }
        </style>
    </head>
    <body onload="window.KnightLoreInfinity.start()">
        <main class="page-shell">
            <div id="jsspeccy"></div>
            <section id="knight-lore-stage1-diagnostics" class="diagnostics">
                <h1>Stage 1 - Read-Only Room Loading Anatomy</h1>
                <table class="diagnostics-table">
                    <thead>
                        <tr>
                            <th class="field">Field</th>
                            <th class="value">Value</th>
                            <th class="notes">Notes</th>
                        </tr>
                    </thead>
                    <tbody id="stage1-diagnostics-body"></tbody>
                </table>
            </section>
            <section id="knight-lore-stage2-diagnostics" class="diagnostics">
                <h1>Stage 2 - Physical 5-Room Cross</h1>
                <p id="stage2-status" class="stage-status">Diagnostics build: stage3-square-cross-20260629-1. Waiting for the first Stage 2 sample.</p>
                <table class="diagnostics-table cross-table">
                    <thead>
                        <tr>
                            <th>Role</th>
                            <th>Room</th>
                            <th>Entry</th>
                            <th>Header</th>
                            <th>Size</th>
                            <th>Counts</th>
                            <th>Arch Exits</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="stage2-cross-body"></tbody>
                </table>
            </section>
        </main>
    </body>
</html>
